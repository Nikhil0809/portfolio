<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Big Question</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#ee2b5b",
                "background-light": "#fff5f7",
                "background-dark": "#221015",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating-sparkle {
            position: absolute;
            pointer-events: none;
            background: radial-gradient(circle, #ee2b5b 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0.3;
        }
        #no-button {
            transition: all 0.2s ease-out;
            position: relative;
        }
        .success-state {
            display: none;
        }
        .success-active .success-state {
            display: flex;
        }
        .success-active .initial-state {
            display: none;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden antialiased">
<div class="relative flex h-screen w-full flex-col items-center justify-center p-6 group/design-root">
<!-- Background Sparkles (Static representation of the requested theme) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="floating-sparkle w-4 h-4 top-1/4 left-1/4"></div>
<div class="floating-sparkle w-6 h-6 top-3/4 left-1/3"></div>
<div class="floating-sparkle w-3 h-3 top-1/2 left-3/4"></div>
<div class="floating-sparkle w-5 h-5 top-1/10 left-2/3"></div>
<div class="absolute inset-0 opacity-10 bg-[radial-gradient(#ee2b5b_1px,transparent_1px)] [background-size:40px_40px]"></div>
</div>
<!-- Initial Question State -->
<div class="initial-state flex flex-col items-center gap-12 z-10 max-w-2xl text-center">
<div class="space-y-4">
<div class="flex justify-center mb-4">
<span class="material-symbols-outlined text-primary text-6xl">favorite</span>
</div>
<h1 class="text-4xl md:text-6xl font-extrabold text-[#181113] tracking-tight leading-tight">
                    Will You Be My <span class="text-primary">Best Friend Forever?</span>
</h1>
<p class="text-lg text-[#181113]/70 font-medium">This is the moment that changes everything.</p>
</div>
<div class="flex flex-col sm:flex-row items-center justify-center gap-6 w-full px-4">
<!-- YES BUTTON -->
<button class="group relative flex min-w-[180px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-16 px-8 bg-primary text-white text-xl font-bold transition-transform hover:scale-110 active:scale-95 shadow-lg shadow-primary/25" onclick="document.body.classList.add('success-active')">
<span class="flex items-center gap-2">
                        YES! <span class="material-symbols-outlined text-2xl">celebration</span>
</span>
</button>
<!-- NO BUTTON (Playful escaping button logic simulation via CSS/structure) -->
<div class="relative" id="no-container">
<button class="flex min-w-[140px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-16 px-8 bg-white/80 border-2 border-[#181113]/10 text-[#181113]/60 text-lg font-bold hover:bg-white transition-all" id="no-button" onmouseover="moveButton(this)">
                        No
                    </button>
</div>
</div>
</div>
<!-- Success State (Hidden initially) -->
<div class="success-state flex flex-col items-center gap-8 z-20 text-center px-4">
<div class="relative">
<div class="w-64 h-64 rounded-full bg-primary/10 flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-9xl">auto_awesome</span>
</div>
<!-- Mini Heart Explosions represented by icons -->
<span class="absolute -top-4 -right-4 material-symbols-outlined text-primary text-4xl">favorite</span>
<span class="absolute top-1/2 -left-8 material-symbols-outlined text-primary text-3xl">favorite</span>
<span class="absolute -bottom-4 right-1/4 material-symbols-outlined text-primary text-2xl">favorite</span>
</div>
<div class="space-y-4">
<h2 class="text-5xl font-extrabold text-[#181113] tracking-tight">I knew you'd say yes! ❤️</h2>
<p class="text-xl text-[#181113]/80 max-w-md mx-auto leading-relaxed">
                    Our friendship is the greatest adventure. Get ready for a lifetime of laughter, secrets, and memories together!
                </p>
</div>
<button class="flex items-center gap-2 px-6 py-3 bg-white text-[#181113] font-bold rounded-xl border border-[#181113]/10 hover:bg-gray-50 transition-colors" onclick="window.location.reload()">
<span class="material-symbols-outlined text-sm">replay</span>
                Relive the Moment
            </button>
</div>
<!-- Image Gallery (The memories) -->
<div class="initial-state absolute bottom-8 left-0 right-0 px-4 flex justify-center gap-4 opacity-50 grayscale hover:grayscale-0 transition-all duration-500">
<div class="w-20 h-20 rounded-lg overflow-hidden border-2 border-white shadow-sm rotate-[-6deg]">
<img class="w-full h-full object-cover" data-alt="Two best friends laughing together" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfgHQAfAKAkcyjMbALSlp59oiza7Z0q-STeP1GaJfdtsq6Kz6l0tFugDGVDPeTlaPhHvYXdtwryPOw0-DXS27Qt81Eg9ZIFuaAo-9Itr4ADiHNZ6ei6G8UlhBX1Hug2lrqg3HQGvMN__4-_ax3iY6wLp4Qhj1cQmbUTQR1iyMTk5yy5zyila7MoofB756esRi4cNGeQtbZ6N4Q0s6uGAfYxtE_EvXq0BGVnt2i8cR9vMGLmnIrIGRp9qQAM30nrjtzpG8caUrH7rE"/>
</div>
<div class="w-20 h-20 rounded-lg overflow-hidden border-2 border-white shadow-sm rotate-[4deg]">
<img class="w-full h-full object-cover" data-alt="Friends cheering with drinks at sunset" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBE4h0lcN-ObNJxK5SUFy4LIclmrq7Tq_zO8pWezW_9_0pndZo07Ep_99QJOOSXMz8ghgiurnWCVsu_yJ84uUCLLYkZ_qRZisLZGNAkHtuexYBFfse34gweHFgTFrfik0Rkxb51DwGb2uDZxCNRKWN4PONc5I1EPf770fDTYk5h-iCNEEYxnkwdvEN0oXO3NRzT4h9CUfAkXJw2BbGDsiftniysbWJEk9FNBHrOPNPo7_MqLtST7mHM2QrPLOh4BJrLGUviie1Q-3A"/>
</div>
<div class="w-20 h-20 rounded-lg overflow-hidden border-2 border-white shadow-sm rotate-[-3deg]">
<img class="w-full h-full object-cover" data-alt="Group of friends sitting on a bench" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDq4JBnsj8Fhgeyg_GSJu1YR0KqK6T_6v6lkHNuk30aekdaq5_nOfhLQQ2pYalfk2sWwFbuD8YXTGA11z5vQ-hBOVr2rrUDZmKrWoUDADjv-dszduZx0R9-PxQE9oTYsRvSTmFCl7Bnt3h1zOB25OO_zVl8gLPNMG3FmJKdgUrA8cKmomqxPAH-gdbbUlFDJFKjdA3k9wuB0ZWDlzhaDR9s0boyoMCeL7-wyzo-A02a5p8gOPBI5cu5AlJ4Bn_4mrG4noZxYR8sQsk"/>
</div>
</div>
</div>
<script>
        function moveButton(btn) {
            const container = document.body;
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            
            // Generate random positions within the viewport, staying away from edges
            const randomX = Math.floor(Math.random() * (containerWidth - 200)) + 100;
            const randomY = Math.floor(Math.random() * (containerHeight - 100)) + 50;
            
            btn.style.position = 'fixed';
            btn.style.left = randomX + 'px';
            btn.style.top = randomY + 'px';
            btn.style.zIndex = '50';
        }

        // For touch devices, move the button on touchstart
        document.getElementById('no-button').addEventListener('touchstart', function(e) {
            e.preventDefault();
            moveButton(this);
        });
    </script>
</body></html>
